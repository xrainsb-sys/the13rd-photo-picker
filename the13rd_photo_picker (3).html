px;background:#23211e;color:#fff;width:16px;height:16px;border-radius:50%;font-size:11px;line-height:16px;text-align:center;cursor:pointer}#barwrap{position:sticky;top:0;z-index:30;background:rgba(246,244,241,.96);border-bottom:1px solid var(--line);margin:0 -20px 12px;padding:10px 20px}#barinfo{font-size:13px}#barwrap .btns{margin-top:6px;display:flex;gap:8px;align-items:center}#q{flex:1;max-width:280px;padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff}button{font-family:inherit;font-size:12.5px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 12px;border-radius:6px;cursor:pointer}button.pri{background:#23211e;color:#fff;border-color:#23211e}h2{font-size:15px;font-weight:500;margin:18px 0 8px}#gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}.th{position:relative;border:1px solid var(--line);border-radius:6px;overflow:hidden;cursor:pointer;background:#ece8e2}.th.sel{outline:3px solid var(--on);outline-offset:-3px}.th img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}.th .fn{font-size:9.5px;font-family:ui-monospace,monospace;color:var(--mut);padding:2px 4px;background:#fbfaf8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.th .badge{position:absolute;top:5px;right:5px;background:var(--on);color:#fff;width:20px;height:20px;border-radius:50%;font-size:12px;line-height:20px;text-align:center}#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center}.ovbox{background:#fff;border-radius:10px;padding:18px;width:min(680px,92vw)}#exptext{width:100%;height:300px;font-family:ui-monospace,monospace;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:10px}</style></head><body><div class="wrap"><h1>The 1/3rd 白馬 — 照片挑選器</h1><div class="sub">13 個圖位｜下方 333 張縮圖牆｜點某格→點縮圖加入｜<b style="color:#5d7a52">已還原你挑的照片</b></div><div class="note"><b>⚠ 季節提醒：</b>全批實拍為<b>夏季</b>（戶外、窗景皆綠，無雪）。室內可直接用
